openapi: 3.0.0
info:
  title: LocalSearchEngine API Contracts
  version: 1.0.0
  description: Automatically generated strict OpenAPI specification based on `contracts/*.api.md`.
paths:
  /v1/auth/send-otp:
    post:
      summary: Send an OTP to the user's phone for login or registration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /v1/auth/verify-otp:
    post:
      summary: Verify the previously sent OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone:
                  type: string
                  minLength: 10
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refreshToken:
                    type: string
                  userId:
                    type: string
                    format: uuid

  /v1/auth/refresh-token:
    post:
      summary: Refresh an expired JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /v1/users/me:
    get:
      summary: Get current user profile.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  name:
                    type: string
                  phone:
                    type: string

  /v1/users/preferences:
    get:
      summary: Get user personalization preferences.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: boolean
                  theme:
                    type: string

  /v1/users/favorites:
    get:
      summary: List user's favorite shops.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  shops:
                    type: array
                    items:
                      type: object
                      properties:
                        shopId:
                          type: string
                          format: uuid
                        name:
                          type: string

  /v1/users/favorites/{shopId}:
    post:
      summary: Add a shop to favorites.
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
    delete:
      summary: Remove shop from favorites.
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /v1/shops:
    post:
      summary: Register a new shop.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, category, lat, lng]
              properties:
                name:
                  type: string
                  minLength: 2
                category:
                  type: string
                lat:
                  type: number
                lng:
                  type: number
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                type: object
                properties:
                  shopId:
                    type: string
                    format: uuid
                  status:
                    type: string

  /v1/shops/nearby:
    get:
      summary: Find shops near a specific location.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: radius
          in: query
          required: false
          schema:
            type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  shops:
                    type: array
                    items:
                      type: object

  /v1/shops/{shopId}:
    get:
      summary: Get shop details.
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  shopId:
                    type: string
                    format: uuid
                  name:
                    type: string

  /v1/shops/{shopId}/availability:
    patch:
      summary: Update shop operational status.
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isOpen]
              properties:
                isOpen:
                  type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /v1/products:
    post:
      summary: Create a new product in the catalog.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shopId, name, price, category]
              properties:
                shopId:
                  type: string
                  format: uuid
                name:
                  type: string
                  minLength: 2
                description:
                  type: string
                price:
                  type: number
                category:
                  type: string
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                type: object
                properties:
                  productId:
                    type: string
                    format: uuid

  /v1/products/{productId}:
    get:
      summary: Get specific product details.
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  productId:
                    type: string
                    format: uuid
                  name:
                    type: string
                  price:
                    type: number

  /v1/shops/{shopId}/products:
    get:
      summary: List all products for a specific shop.
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object

  /v1/chat/conversations:
    post:
      summary: Create a new chat conversation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shopId]
              properties:
                shopId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                    format: uuid

  /v1/chat/messages:
    post:
      summary: Send a new message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId, text]
              properties:
                conversationId:
                  type: string
                  format: uuid
                text:
                  type: string
                  minLength: 1
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageId:
                    type: string
                    format: uuid
                  timestamp:
                    type: string
                    format: date-time

  /v1/chat/quotes:
    post:
      summary: Create a negotiation quote.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId, offerAmount]
              properties:
                conversationId:
                  type: string
                  format: uuid
                offerAmount:
                  type: number
                items:
                  type: array
                  items:
                    type: object
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                type: object
                properties:
                  quoteId:
                    type: string
                    format: uuid

  /v1/drivers:
    post:
      summary: Register or update driver profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, vehicleType]
              properties:
                name:
                  type: string
                  minLength: 2
                vehicleType:
                  type: string
                  enum: [BIKE, CAR, VAN]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  driverId:
                    type: string
                    format: uuid

  /v1/drivers/location:
    post:
      summary: Send location update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat:
                  type: number
                lng:
                  type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /v1/drivers/offline:
    post:
      summary: Mark driver as offline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /v1/search/products:
    get:
      summary: Search for products across shops.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: lat
          in: query
          required: false
          schema:
            type: number
        - name: lng
          in: query
          required: false
          schema:
            type: number
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object

  /v1/search/shops:
    get:
      summary: Search for shops.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: lat
          in: query
          required: false
          schema:
            type: number
        - name: lng
          in: query
          required: false
          schema:
            type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object

  /v1/orders:
    post:
      summary: Create a new order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shopId, items]
              properties:
                shopId:
                  type: string
                  format: uuid
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [productId, quantity]
                    properties:
                      productId:
                        type: string
                        format: uuid
                      quantity:
                        type: integer
                        minimum: 1
      responses:
        '201':
          description: CREATED
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                  status:
                    type: string
                  totalAmount:
                    type: number

  /v1/orders/{orderId}:
    get:
      summary: Get details of a specific order.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                  status:
                    type: string
                  shopId:
                    type: string
                  totalAmount:
                    type: number
                  items:
                    type: array
                    items:
                      type: object

  /v1/orders/{orderId}/driver:
    patch:
      summary: Assign a driver to an order.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [driverId]
              properties:
                driverId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string

  /v1/orders/{orderId}/status:
    patch:
      summary: Update the status of an order.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [CONFIRMED, PICKED_UP, OUT_FOR_DELIVERY, COMPLETED]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
